<div class="todos">
  <h2>To Do List</h2>
  <div
    *ngFor="let todo of todo; let i = index"
    class="todo {{ todo.completed ? 'done' : '' }}"
  >
    <div class="id">{{ i + 1 }}</div>
    <div class="content">{{ todo.title }}</div>
    <button mat-button color="warn" class="delete" (click)="deleteTodo(i)">Remove</button>
  </div>
</div>
